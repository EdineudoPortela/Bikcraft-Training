<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bikcraft</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <form>
        <div class="primary-box">
            <div>
                <label>nome</label>
                <input type="text" placeholder="Seu nome" />
            </div>
            <div>
                <label>telefone<label>
                <input type="tel" placeholder="(xx) xxxxxxxxx" />
            </div>
        </div>

        <!-- Segunda caixa -->
        <div>
            <label>email</label>
            <input type="email" placeholder="contato@email.com">
        </div>

        <!-- Terceira caixa -->
        <div>
            <label>mensagem</label>
            <textarea placeholder="O que você precisa?"></textarea>

        </div>

        <!-- Botão -->
        <button>envie sua mensagem</button>
    </form>
</body>

</html>
